<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaModa App Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-app">
        <div class="navbar-app-contenedor">
            <div class="buscador-app-wrapper">
                <svg class="icono-buscar" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a9a9a9" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="input-busqueda" placeholder="Buscar na MegaModa...">
                <button id="btn-ejecutar-busqueda" class="btn-camara-simulada">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ee4d2d" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </button>
            </div>
            <div class="modulo-carrito-app" id="boton-ver-carrito">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="badge-contador-carrito">0</span>
            </div>
        </div>
    </header>

    <div class="banner-campaña-app">
        <div class="banner-contenido">
            <span class="badge-tag">6.6 Flash</span>
            <h2>FALTAN 5 DÍAS</h2>
            <p>Envío gratis mundial sin mínimo de compra</p>
        </div>
    </div>

    <section class="menu-accesos-rapidos">
        <button class="acceso-item control-filtro-btn activo" data-valor="todas">
            <div class="circulo-icono ic-todo">🌐</div>
            <span>Catálogo</span>
        </button>
        <button class="acceso-item control-filtro-btn" data-valor="clothes">
            <div class="circulo-icono ic-ropa">👕</div>
            <span>Ropa</span>
        </button>
        <button class="acceso-item control-filtro-btn" data-valor="shoes">
            <div class="circulo-icono ic-zapatos">👟</div>
            <span>Calzado</span>
        </button>
        <button class="acceso-item control-filtro-btn" data-valor="electronics">
            <div class="circulo-icono ic-cupon">🎟️</div>
            <span>Cupones</span>
        </button>
    </section>

    <main class="contenedor-app-feed">
        
        <div class="barra-filtros-compacta">
            <div class="filtro-precio-mini">
                <span>Máx: <strong id="etiqueta-precio-max">$300</strong></span>
                <input type="range" id="slider-rango-price" min="10" max="300" value="300" style="display:none;">
                <input type="range" id="slider-rango-precio" min="10" max="300" value="300">
            </div>
            <select id="control-ordenamiento" class="select-app-filtro">
                <option value="relevancia">Destacados</option>
                <option value="ascendente">Menor Precio</option>
                <option value="descendente">Mayor Precio</option>
            </select>
        </div>

        <p id="contador-resultados-productos" class="contador-feed-app">Cargando ofertas del día...</p>

        <div class="rejilla-dinamica-productos" id="contenedor-grid-productos">
            </div>
    </main>

    <div class="modal-carrito-deslizable" id="capa-modal-carrito">
        <div class="panel-carrito-contenido">
            <div class="cabecera-carrito">
                <h3>Bolsa de Compras</h3>
                <button id="btn-colapsar-carrito" class="btn-cerrar-X">&times;</button>
            </div>
            <div class="cuerpo-items-carrito" id="lista-articulos-carrito">
                <div class="notificacion-carrito-vacio" id="mensaje-carrito-vacio">
                    <p>Tu bolsa está vacía.</p>
                </div>
            </div>
            <div class="pie-checkout-carrito">
                <div class="resumen-financiero-linea total-destacado">
                    <span>Total:</span>
                    <span id="txt-total-pago">$0.00</span>
                </div>
                <button id="btn-ejecutar-checkout" class="btn-checkout-app">Proceder al Pago Seguro</button>
            </div>
        </div>
    </div>

    <nav class="barra-inferior-app">
        <div class="tab-item activo">
            <span class="tab-icono">🏠</span>
            <span class="tab-texto">Início</span>
        </div>
        <div class="tab-item">
            <span class="tab-icono">🛍️</span>
            <span class="tab-texto">Oficiais</span>
        </div>
        <div class="tab-item">
            <span class="tab-icono">🎥</span>
            <span class="tab-texto">Live</span>
        </div>
        <div class="tab-item contenedor-notif">
            <span class="tab-icono">🔔</span>
            <span class="tab-texto">Notificações</span>
            <span class="badge-notif">10</span>
        </div>
        <div class="tab-item">
            <span class="tab-icono">👤</span>
            <span class="tab-texto">Eu</span>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
